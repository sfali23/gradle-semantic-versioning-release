# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/platforms.html#sub::toml-dependencies-format

[versions]
kotlin-jvm = "2.2.0"
publish = "0.36.0"
spotless = "8.5.1"
jgit = "7.6.0.202603022253-r"
typesafe = "1.4.8"
junit-jupiter = "5.10.0"
junit-platform = "1.10.0"
cucumber-java = "7.14.0"
cucumber-expressions = "16.1.2"
gradle-semver-release-plugin = "0.1.0"

[libraries]
jgit = { module = "org.eclipse.jgit:org.eclipse.jgit", version.ref = "jgit" }
jgit-junit = { module = "org.eclipse.jgit:org.eclipse.jgit.junit", version.ref = "jgit" }
typesafe = { module = "com.typesafe:config", version.ref = "typesafe" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }
junit-platform-suit = { module = "org.junit.platform:junit-platform-suite", version.ref = "junit-platform" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher", version.ref = "junit-platform" }
cucumber-java = { module = "io.cucumber:cucumber-java", version.ref = "cucumber-java" }
cucumber-expressions = { module = "io.cucumber:cucumber-expressions", version.ref = "cucumber-expressions" }
cucumber-junit-platform-engine = { module = "io.cucumber:cucumber-junit-platform-engine", version.ref = "cucumber-java" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin-jvm" }
publish = { id = "com.vanniktech.maven.publish", version.ref = "publish" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
gradle-semver-release = { id = "io.github.sfali23.gradle-semantic-versioning-release", version.ref = "gradle-semver-release-plugin" }
